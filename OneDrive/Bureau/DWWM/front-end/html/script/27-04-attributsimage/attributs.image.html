<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Attributs d'image</title>
    <script src="attributs.image.js" defer></script>
    <style>
        body { font-family: sans-serif; text-align: center; }
        img { max-width: 300px; border: 2px solid #ccc; margin: 20px; }
        button { margin: 5px; padding: 5px 10px; }
    </style>
</head>
<body>
    <h1>Manipulation d'attributs</h1>

    <img id="monImage" src="https://placehold.co/600x400" alt="Image de test" width="600" height="400">

    <div>
        <button id="btnGetSrc">Afficher src</button>
        <button id="btnSetSrc">Changer src</button>
        <button id="btnGetWidth">Afficher largeur</button>
        <button id="btnSetWidth">Changer largeur</button>
        <button id="btnSetCustom">Ajouter data-test</button>
        <button id="btnGetCustom">Afficher data-test</button>
    </div>

    <div id="resultat" style="margin-top: 20px; font-weight: bold;"></div>

     
</body>
</html>
