<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Galerie de Mèmes</title>
    <link rel="stylesheet" href="galerie.css">
</head>
<body>
    <h1>🎭 Ma Galerie de Mèmes 🎭</h1>

    <div class="galerie">
        <div class="meme-card" data-message="JE SUIS TRÈS EN COLÈRE ! 😤">
            <div class="meme-emoji">😾</div>
            <h3>Chat en colère</h3>
            <div class="message-rigolo"></div>
        </div>

        <div class="meme-card" data-message="WOUAH ! Quelle surprise ! 😲">
            <div class="meme-emoji">🐶</div>
            <h3>Chien surpris</h3>
            <div class="message-rigolo"></div>
        </div>

        <div class="meme-card" data-message="Zzzzz... laisse-moi dormir ! 😴">
            <div class="meme-emoji">🐼</div>
            <h3>Panda qui dort</h3>
            <div class="message-rigolo"></div>
        </div>

        <div class="meme-card" data-message="BANAAAAANE ! 🍌">
            <div class="meme-emoji">🐵</div>
            <h3>Singe excité</h3>
            <div class="message-rigolo"></div>
        </div>

        <div class="meme-card" data-message="Je danse toute la nuit ! 💃">
            <div class="meme-emoji">🦄</div>
            <h3>Licorne qui danse</h3>
            <div class="message-rigolo"></div>
        </div>

        <div class="meme-card" data-message="Pizza pizza pizza ! 🍕">
            <div class="meme-emoji">🐸</div>
            <h3>Grenouille affamée</h3>
            <div class="message-rigolo"></div>
        </div>
    </div>

    <script src="galerie.js"></script>
</body>
</html>
