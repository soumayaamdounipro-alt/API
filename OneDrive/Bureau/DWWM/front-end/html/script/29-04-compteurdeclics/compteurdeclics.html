<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur de Clics</title>
    <link rel="stylesheet" href="compteurdeclics.css">
</head>
<body>
    <div class="container">
        <h1>🔢 Compteur de Clics</h1>

        <div class="compteur-display">
            <span id="nombre-clics">0</span>
        </div>

        <div class="boutons">
            <button id="btn-compter" class="btn btn-compter">👆 Compter</button>
            <button id="btn-reset" class="btn btn-reset">🔄 Reset</button>
        </div>

        <div class="infos">
            <p>Cliquez sur "Compter" pour augmenter</p>
            <p>Cliquez sur "Reset" pour remettre à zéro</p>
        </div>
    </div>

    <script src="compteurdeclics.js"></script>
</body>
</html>
