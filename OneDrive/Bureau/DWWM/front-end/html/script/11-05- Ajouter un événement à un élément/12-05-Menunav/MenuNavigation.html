<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Navigation</title>
    <link rel="stylesheet" href="MenuNavigation.css">
</head>
<body>
    <nav id="menu">
        <div class="menu-item" data-category="accueil">
            <h3>Accueil</h3>
            <span class="icon">
</span>
        </div>
        <div class="menu-item" data-category="produits">
            <h3>Produits</h3>
            <span class="icon">
</span>
            <div class="submenu">
                <span class="submenu-item" data-product="laptop">Ordinateurs</span>
                <span class="submenu-item" data-product="phone">Téléphones</span>
            </div>
        </div>
        <div class="menu-item" data-category="services">
            <h3>Services</h3>
            <span class="icon">
</span>
            <div class="submenu">
                <span class="submenu-item" data-service="support">Support</span>
                <span class="submenu-item" data-service="formation">Formation</span>
            </div>
        </div>
    </nav>
    <div id="info">
        <p>Cliquez sur un élément du menu</p>
    </div>
    <script src="MenuNavigation.js"></script>
</body>
</html>
