<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Application Météo</title>
    <link rel="stylesheet" href="Meteodelasemaine.css">
</head>
<body>
    <div class="container">
        <h1>Météo de la Semaine</h1>

        <div class="btns-container">
            <button id="btn-theme"><span id="theme-icon">☀️</span> Mode Nuit</button>
        </div>

        <div class="meteo-app">
            <h2>Prévisions Météo - Paris</h2>

            <div class="meteo-cartes">
                <div class="meteo-carte" id="jour1">
                    <h3>Lundi</h3>
                    <p>21°C</p>
                    <p>Ensoleillé</p>
                </div>

                <div class="meteo-carte" id="jour2">
                    <h3>Mardi</h3>
                    <p>19°C</p>
                    <p>Partiellement nuageux</p>
                </div>

                <div class="meteo-carte" id="jour3">
                    <h3>Mercredi</h3>
                    <p>18°C</p>
                    <p>Nuageux</p>
                </div>

                <div class="meteo-carte" id="jour4">
                    <h3>Jeudi</h3>
                    <p>17°C</p>
                    <p>Pluvieux</p>
                </div>

                <div class="meteo-carte" id="jour5">
                    <h3>Vendredi</h3>
                    <p>16°C</p>
                    <p>Pluvieux</p>
                </div>

                <div class="meteo-carte" id="jour6">
                    <h3>Samedi</h3>
                    <p>18°C</p>
                    <p>Nuageux</p>
                </div>
            </div>
        </div>
    </div>

     <script src="Meteodelasemaine.js" defer></script>
</body>
</html>
